<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WealthFlow - Add Transaction</title>

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #131313;
        color: #e5e2e1;
        font-family: 'Inter', sans-serif;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        ring: 0;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#131313]/60 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity scale-95 active:duration-100 text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-bold text-2xl tracking-tight text-on-surface">Add Transaction</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/20">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="portrait of a professional man in a dark suit with soft studio lighting and a clean neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDjIrqu3MuutB8dkBreCfRdPxeI0nvcJp2O8kwxKBN9DfiT6oMtVMUCvC7Cx25w72KlDDDxQnbS42DIoMLCmtLXcfU9s2YwKQKVsPSH_JK3YuyLcJoahcHnUNfoEpZ7YEGAY3lRe9gKiCoWbUN4M0yA9-3qMmhFbOCUTTK4pHRqp4RtWHTzlkSKPzETURrBpfruDqD5jYm9GzhmFxx0Ttk4P5HR7CdDKEpgWQbo31XUmnaklSUGYN3BK5NGHEURF_6yncFwWQ6RENU"/>
</div>
</nav>
<!-- Main Content -->
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto min-h-screen">
<!-- Transaction Type Segmented Control -->
<div class="bg-surface-container-lowest p-1 rounded-full flex mb-12 border border-outline-variant/10">
<button class="flex-1 py-3 px-4 rounded-full text-sm font-semibold transition-all duration-300 bg-primary-container text-on-primary-container">
                Income
            </button>
<button class="flex-1 py-3 px-4 rounded-full text-sm font-semibold transition-all duration-300 text-on-surface-variant hover:text-on-surface">
                Expense
            </button>
<button class="flex-1 py-3 px-4 rounded-full text-sm font-semibold transition-all duration-300 text-on-surface-variant hover:text-on-surface">
                Transfer
            </button>
</div>
<!-- Amount Input Section -->
<div class="mb-16 text-center">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-primary mb-4">Amount</label>
<div class="flex items-baseline justify-center gap-1">
<span class="text-4xl font-light text-primary">₦</span>
<input class="bg-transparent border-none text-6xl md:text-8xl font-black tracking-tighter text-on-surface placeholder:text-surface-container-highest focus:ring-0 w-full text-center max-w-[400px]" placeholder="0.00" type="text"/>
</div>
</div>
<!-- Form Fields Bento Layout -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- From Account -->
<div class="bg-surface-container-high p-6 rounded-xl border border-outline-variant/5 hover:border-outline-variant/20 transition-colors">
<label class="block text-[10px] uppercase tracking-wider font-bold text-on-surface-variant mb-2">From Account</label>
<div class="relative">
<select class="w-full bg-transparent border-none p-0 text-lg font-semibold text-on-surface appearance-none focus:ring-0 cursor-pointer">
<option>Savings</option>
<option>Betting</option>
<option>Liquidity</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Date Picker -->
<div class="bg-surface-container-high p-6 rounded-xl border border-outline-variant/5 hover:border-outline-variant/20 transition-colors">
<label class="block text-[10px] uppercase tracking-wider font-bold text-on-surface-variant mb-2">Transaction Date</label>
<div class="relative">
<input class="w-full bg-transparent border-none p-0 text-lg font-semibold text-on-surface focus:ring-0 cursor-pointer" type="date" value="2023-10-27"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">calendar_today</span>
</div>
</div>
<!-- Category / Note -->
<div class="md:col-span-2 bg-surface-container-high p-6 rounded-xl border border-outline-variant/5 hover:border-outline-variant/20 transition-colors">
<label class="block text-[10px] uppercase tracking-wider font-bold text-on-surface-variant mb-2">Category / Description</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">label</span>
<input class="w-full bg-transparent border-none p-0 text-lg font-medium text-on-surface placeholder:text-on-surface-variant/30 focus:ring-0" placeholder="e.g. Monthly Salary or Bonus" type="text"/>
</div>
</div>
<!-- Conditional To Account (Shown for Transfer) - Using a tonal shift to indicate state -->
<div class="md:col-span-2 bg-surface-container-low p-6 rounded-xl border border-dashed border-outline-variant/20 opacity-50">
<label class="block text-[10px] uppercase tracking-wider font-bold text-on-surface-variant mb-2">To Account (Transfers Only)</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">swap_horiz</span>
<span class="text-on-surface-variant italic">Select Transfer above to enable</span>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="mt-12">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-bold py-5 rounded-full shadow-[0_12px_24px_rgba(16,185,129,0.2)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Save Transaction
            </button>
<p class="text-center text-[11px] text-on-surface-variant/40 mt-6 tracking-widest uppercase font-medium">Verified by WealthFlow Ledger</p>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed as per task focused journey rule, but present for system integrity if needed) -->
<!-- Navigation is hidden on task-focused screens like 'Add' as per the 'Relevance Check' and 'UX Goal' -->
<!-- Decorative Elements -->
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
